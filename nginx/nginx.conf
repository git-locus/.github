# nginx.conf per l'ambiente Docker Compose.
#
# Di sviluppo locale usa knowledge/development/nginx/nginx.conf
# (upstream a 0.0.0.0 sulla macchina host).
# Qui gli upstream puntano ai service name di compose.

events {}

http {

    upstream django {
        server api:8000;
    }

    upstream nextjs {
        server client:3000;
    }

    server {
        listen 80;

        location / {
            # next dev richiede il forward dei websocket:
            # https://github.com/vercel/next.js/issues/30491
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /static/ {
            alias /static/;
        }

        # upload immagini
        client_max_body_size 500M;
    }
}
