# Config temporanea usata da init-https.sh per servire la ACME challenge
# durante la prima acquisizione del certificato Let's Encrypt.
# nginx viene avviato con questa config, certbot fa la challenge, poi nginx viene fermato.

events {}

http {
    server {
        listen 8080;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 200 'ACME ready';
            add_header Content-Type text/plain;
        }
    }
}
