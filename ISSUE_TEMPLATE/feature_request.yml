name: "Feature Request"
description: "Proponi una nuova funzionalità."
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problema da risolvere
      description: Quale problema o esigenza motiva questa richiesta?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Soluzione proposta
      description: Come vorresti che funzionasse?
    validations:
      required: true
  - type: dropdown
    id: repo
    attributes:
      label: Repository
      options:
        - api
        - client
        - .github (infrastruttura)
    validations:
      required: false
