name: "Bug Report"
description: "Segnala un comportamento inatteso."
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descrizione
      description: Cosa succede? Cosa dovrebbe succedere invece?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passi per riprodurre
      placeholder: |
        1. Vai a '...'
        2. Clicca su '...'
        3. Vedi errore
    validations:
      required: true
  - type: dropdown
    id: repo
    attributes:
      label: Repository
      options:
        - api
        - client
        - .github (infrastruttura)
    validations:
      required: true
