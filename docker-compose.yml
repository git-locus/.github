# Docker Compose per sviluppo locale di Locus.
#
# NON usa Dockerfile né immagini custom: solo immagini base + sorgente montato.
# Le dipendenze vengono cachate in volumi dedicati e saltate ai restart successivi.
#
# Utilizzo:
#   podman compose up
#   (oppure docker compose up se si preferisce Docker)
#
# Variabili d'ambiente:
#   Crea un file .env a partire da .env.example prima di avviare.

# Project name esplicito: senza questo i container prenderebbero il nome
# della cartella (".github" → "github_*"), invisibili come "locus" in
# Podman Desktop / Docker Desktop.
name: locus

services:

  # ---------------------------------------------------------------------------
  # Azurite – emulatore Azure Blob Storage in locale
  # ---------------------------------------------------------------------------
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    restart: unless-stopped
    # --skipApiVersionCheck: l'SDK azure-storage-blob più recente usa una API
    # version che Azurite stable non riconosce. Azurite la gestisce comunque.
    command: azurite-blob --blobHost 0.0.0.0 --skipApiVersionCheck
    ports:
      # Esposto sull'host così il browser può scaricare i blob (thumbnails,
      # immagini dei post, ecc) usando AZURITE_PUBLIC_HOST=localhost:10000.
      - "10000:10000"
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10000"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # API Django – settings_dev (SQLite, DEBUG=True), sorgente montato, hot-reload
  # ---------------------------------------------------------------------------
  api:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      # Sorgente live: ogni modifica al codice è subito visibile
      - ../api/src:/app:z
      # Cache del virtualenv: uv sync è istantaneo dopo la prima volta
      - api_venv:/app/.venv
      # uv binary copiato dall'immagine ufficiale (montato in sola lettura)
      - api_uv_bin:/uv_bin
      # File statici condivisi con nginx
      - static_files:/static
    environment:
      DJANGO_SETTINGS_MODULE: api.settings_dev
      # Azurite: hostname interno per le upload, hostname host-side per le URL
      # browser-facing (vedi apps/media/storages.AzuriteStorage).
      AZURITE_HOST: "azurite:10000"
      AZURITE_PUBLIC_HOST: "localhost:10000"
      # ACS (email) non è usato in dev locale; placeholder per import.
      ACS_CONNECTION_STRING: ${ACS_CONNECTION_STRING:-endpoint=https://fake.communication.azure.com/;accesskey=fake}
      PATH: /app/.venv/bin:/uv_bin:/usr/local/bin:/usr/bin:/bin
      VIRTUAL_ENV: /app/.venv
    # Bootstrap: install uv (cached), sync deps, create blob containers, migrate, run.
    command: >
      sh -c "
        [ -f /uv_bin/uv ] || (wget -qO- https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/uv_bin sh) &&
        uv sync --frozen &&
        uv run python scripts/init_blob_containers.py &&
        uv run python manage.py makemigrations account category chat notification post &&
        uv run python manage.py migrate --no-input &&
        uv run python manage.py collectstatic --no-input &&
        uv run python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      azurite:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/api/categories/"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Client Next.js – nessuna build, sorgente montato, npm run dev con hot-reload
  # ---------------------------------------------------------------------------
  client:
    image: node:20-alpine
    working_dir: /app
    volumes:
      # Sorgente live
      - ../client:/app:z
      # node_modules in volume separato: non sovrascritto dal mount host
      - client_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    # Installa dipendenze (salta se già presenti) poi avvia dev server
    command: sh -c "npm install && npm run dev"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Nginx – reverse proxy su http://localhost:8080
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - static_files:/static:ro
    depends_on:
      api:
        condition: service_healthy
      client:
        condition: service_healthy

volumes:
  azurite_data:
  static_files:
  api_venv:
  api_uv_bin:
  client_node_modules:
