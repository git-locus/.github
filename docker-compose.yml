# Docker Compose per sviluppo locale di Locus.
#
# NON usa Dockerfile né immagini custom: solo immagini base + sorgente montato.
# Le dipendenze vengono cachate in volumi dedicati e saltate ai restart successivi.
#
# Utilizzo:
#   podman compose up
#   (oppure docker compose up se si preferisce Docker)
#
# Variabili d'ambiente:
#   Crea un file .env a partire da .env.example prima di avviare.

services:

  # ---------------------------------------------------------------------------
  # Database PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-locus}
      POSTGRES_USER: ${POSTGRES_USER:-locus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-locus}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-locus}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # LocalStack – emulazione S3 (e altri servizi AWS) in locale
  # ---------------------------------------------------------------------------
  localstack:
    image: localstack/localstack:latest
    restart: unless-stopped
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: eu-north-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro,z
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # API Django – nessuna build, sorgente montato, runserver con hot-reload
  # ---------------------------------------------------------------------------
  api:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      # Sorgente live: ogni modifica al codice è subito visibile
      - ../api/src:/app:z
      # Cache del virtualenv: uv sync è istantaneo dopo la prima volta
      - api_venv:/app/.venv
      # uv binary copiato dall'immagine ufficiale (montato in sola lettura)
      - api_uv_bin:/uv_bin
      # File statici condivisi con nginx
      - static_files:/static
    environment:
      DJANGO_SETTINGS_MODULE: api.settings_prod
      SECRET_KEY: ${SECRET_KEY:-changeme_in_dev}
      SERVER_HOST: localhost
      SERVER_URL: http://localhost:8080
      JWT_SECRET: ${JWT_SECRET:-changeme_in_dev}
      DATABASE_ENGINE: django.db.backends.postgresql
      POSTGRES_NAME: ${POSTGRES_DB:-locus}
      POSTGRES_USER: ${POSTGRES_USER:-locus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-locus}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-north-1
      AWS_ENDPOINT_URL: http://localstack:4566
      PATH: /app/.venv/bin:/uv_bin:/usr/local/bin:/usr/bin:/bin
      VIRTUAL_ENV: /app/.venv
    # Copia uv nell'apposito volume (solo se non già presente), poi sync e runserver
    command: >
      sh -c "
        [ -f /uv_bin/uv ] || (wget -qO- https://astral.sh/uv/install.sh | UV_INSTALL_DIR=/uv_bin sh) &&
        uv sync --frozen &&
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Client Next.js – nessuna build, sorgente montato, npm run dev con hot-reload
  # ---------------------------------------------------------------------------
  client:
    image: node:18-alpine
    working_dir: /app
    volumes:
      # Sorgente live
      - ../client:/app:z
      # node_modules in volume separato: non sovrascritto dal mount host
      - client_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    # Installa dipendenze (salta se già presenti) poi avvia dev server
    command: sh -c "npm install && npm run dev"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Nginx – reverse proxy su http://localhost:8080
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - static_files:/static:ro
    depends_on:
      api:
        condition: service_started
      client:
        condition: service_healthy

volumes:
  db_data:
  localstack_data:
  static_files:
  api_venv:
  api_uv_bin:
  client_node_modules:
